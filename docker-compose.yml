services:
  app:
    container_name: chronovault-app
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MONGO_URI: ${MONGO_URI}
      POSTGRES_URL: ${POSTGRES_URL}
    ports:
      - "3000:3000"   # web dev server
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: sleep infinity
    networks:
      - chronovault

  api:
    container_name: chronovault-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    volumes:
      - .:/workspace:cached
      - api_node_modules:/workspace/apps/api/node_modules
    working_dir: /workspace/apps/api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      POSTGRES_URL: ${POSTGRES_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES}
      APP_BASE_URL: ${APP_BASE_URL}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - chronovault

  mongo:
    container_name: chronovault-mongo
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronovault

  postgres:
    container_name: chronovault-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chronovault

volumes:
  mongo_data:
  postgres_data:
  api_node_modules:

networks:
  chronovault:
    driver: bridge
